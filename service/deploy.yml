- name: Deploy instahelper service
  hosts: app
  become: yes

  vars:
    service_name: instahelper
    container_image: "pchelbisson/instahelper:latest"
    container_port: "8080:8080"

  tasks:
    - name: Create directory for service files
      file:
        path: "/opt/{{ service_name }}"
        state: directory
        mode: '0755'

    - name: Copy systemd service unit file
      template:
        src: templates/instahelper.service.j2
        dest: "/etc/systemd/system/{{ service_name }}.service"
        mode: '0644'
      notify: restart instahelper service

    - name: Pull the latest Docker image
      command: "docker pull {{ container_image }}"

    - name: Ensure service is started and enabled on boot
      systemd:
        name: "{{ service_name }}"
        state: started
        enabled: yes
        daemon_reload: yes

  handlers:
    - name: restart instahelper service
      systemd:
        name: "{{ service_name }}"
        state: restarted
        daemon_reload: yes