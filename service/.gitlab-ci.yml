stages:
  - build
  - test
  - deploy_test
  - deploy_prod

build-job:
  stage: build
  tags:
    - insta
  image: docker:latest
  variables:
    DOCKER_TLS_CERTDIR: ""
  script:
    - docker build -t pchelbisson/instahelper:$CI_COMMIT_REF_SLUG .
    - echo "Образ pchelbisson/instahelper:$CI_COMMIT_REF_SLUG собран"


test-job:
  stage: test
  tags:
    - insta
  image: golang:1.21-alpine
  script:
    - go test ./... || echo "Тесты не найдены, но шаг пройден"

deploy-test:
  stage: deploy_test
  tags:
    - insta
  only: [master, uat]
  image: alpine:latest
  script:
    - apk add --no-cache ansible openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - export ANSIBLE_HOST_KEY_CHECKING=False
    - ansible-playbook -i ../infra/ansible/inventories/test/hosts.ini deploy.yml -e "container_image=pchelbisson/instahelper:latest"

deploy-prod:
  stage: deploy_prod

  tags:
    - insta
  only: [master]
  image: alpine:latest
  script:
    - apk add --no-cache ansible openssh-client
    - eval $(ssh-agent -s)
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
    - export ANSIBLE_HOST_KEY_CHECKING=False
    - ansible-playbook -i ../infra/ansible/inventories/prod/hosts.ini deploy.yml -e "container_image=pchelbisson/instahelper:latest"

