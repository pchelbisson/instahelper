---
- name: Infrastructure Setup (Docker & GitLab Runner)
  hosts: all
  become: yes
  vars_files:
    - credentials.yml
  tasks:
    - name: Update apt cache and install base packages
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
          - python3-pip
          - gnupg
        state: present
        update_cache: yes

    - name: Add Docker GPG key
      apt_key:
        url: https://download.docker.com/linux/ubuntu/gpg
        state: present

    - name: Add Docker repository
      apt_repository:
        repo: "deb [arch=amd64] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
        state: present

    - name: Install Docker & Compose
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
        state: present

    - name: Install Docker Compose binary
      get_url:
        url: https://github.com/docker/compose/releases/download/v2.24.2/docker-compose-linux-x86_64
        dest: /usr/local/bin/docker-compose
        mode: '0755'

    - name: Add ubuntu user to docker group
      user:
        name: ubuntu
        groups: docker
        append: yes

    - name: Setup GitLab Runner Repository
      block:
        - name: Download GitLab GPG key
          get_url:
            url: https://packages.gitlab.com/gpg.key
            dest: /tmp/gitlab-runner.key
        
        - name: Convert key to keyring
          shell: |
            gpg --dearmor < /tmp/gitlab-runner.key > /usr/share/keyrings/gitlab-runner.gpg
          args:
            creates: /usr/share/keyrings/gitlab-runner.gpg

        - name: Add GitLab Runner repository
          apt_repository:
            repo: "deb [signed-by=/usr/share/keyrings/gitlab-runner.gpg] https://packages.gitlab.com/runner/gitlab-runner/ubuntu/ jammy main"
            state: present
            update_cache: yes

    - name: Install and Register GitLab Runner
      block:
        - name: Install GitLab Runner
          apt:
            name: gitlab-runner
            state: present

        - name: Register GitLab Runner
          command: >
            gitlab-runner register
            --non-interactive
            --url "https://gitlab.skillbox.ru/"
            --registration-token "{{ gitlab_registration_token }}"
            --executor "docker"
            --docker-image "docker:latest"
            --description "yandex-cloud-runner"
            --tag-list "insta"
            --run-untagged="true"
          args:
            creates: /etc/gitlab-runner/config.toml

- name: Deploy Monitoring Stack
  hosts: all
  become: yes
  vars_files:
    - credentials.yml
  tasks:
    - name: Create monitoring directory
      file:
        path: /opt/monitoring
        state: directory
        mode: '0755'

    - name: Copy monitoring configs
      copy:
        src: files/monitoring/
        dest: /opt/monitoring/

    - name: Start monitoring stack
      community.docker.docker_compose_v2:
        project_src: /opt/monitoring
        state: present

- name: Install and Configure Logging
  hosts: all
  become: true
  vars_files:
    - credentials.yml
  roles:
    - logging_agent
